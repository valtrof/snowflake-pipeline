version: 2

models:
  - name: stg_weather
    description: Cleaned and typed daily weather observations from Open-Meteo API.
    columns:
      - name: city
        description: City name
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Seattle', 'New York', 'San Francisco']
      - name: observation_date
        description: Date of the weather observation
        tests:
          - not_null
      - name: temp_max_c
        description: Maximum daily temperature in Celsius
      - name: temp_min_c
        description: Minimum daily temperature in Celsius
      - name: precipitation_mm
        description: Total daily precipitation in millimeters
      - name: windspeed_max_kmh
        description: Maximum daily wind speed in km/h
